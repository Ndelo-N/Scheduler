<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Shift Scheduler PWA</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="World-class student shift scheduling and management system">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Shift Scheduler">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/components.css">
    <link rel="stylesheet" href="src/styles/responsive.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner"></div>
        <p>Loading Student Shift Scheduler...</p>
    </div>

    <!-- Auth gate overlay (Rev1 — shown when same-origin auth server is present) -->
    <div id="auth-gate" class="auth-gate" hidden></div>

    <!-- App Shell -->
    <div id="app" class="app-container" style="display: none;">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <img src="assets/icons/icon-192x192.png" alt="Logo" class="app-logo">
                    <h1>Student Shift Scheduler</h1>
                </div>
                <div class="header-actions">
                    <button id="install-btn" class="btn btn-primary" style="display: none;">
                        Install App
                    </button>
                    <button id="notifications-btn" class="btn btn-secondary">
                        <span class="notification-icon">🔔</span>
                    </button>
                    <button id="user-menu-btn" class="btn btn-secondary" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="user-menu-panel" title="Account">
                        <span class="user-avatar" id="user-avatar-label">👤</span>
                    </button>
                    <div id="user-menu-panel" class="user-menu-panel" role="menu" hidden>
                        <p id="user-menu-name" class="user-menu-name"></p>
                        <button type="button" id="user-logout-btn" class="btn btn-secondary btn-sm user-menu-logout" role="menuitem">Sign out</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="app-navigation">
            <div class="nav-items">
                <button class="nav-item active" data-view="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </button>
                <button class="nav-item" data-view="schedule">
                    <span class="nav-icon">📅</span>
                    <span class="nav-label">Schedule</span>
                </button>
                <button class="nav-item" data-view="swaps">
                    <span class="nav-icon">🔄</span>
                    <span class="nav-label">Swaps</span>
                </button>
                <button class="nav-item" data-view="students">
                    <span class="nav-icon">👥</span>
                    <span class="nav-label">Students</span>
                </button>
                <button class="nav-item" data-view="analytics">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">Analytics</span>
                </button>
                <button class="nav-item" data-view="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Settings</span>
                </button>
            </div>
        </nav>

        <!-- Main Content — views render into these containers -->
        <main class="app-main">
            <div id="dashboard-view" class="view active"></div>
            <div id="schedule-view" class="view"></div>
            <div id="swaps-view" class="view"></div>
            <div id="students-view" class="view"></div>
            <div id="analytics-view" class="view"></div>
            <div id="settings-view" class="view"></div>
        </main>

        <!-- Offline Indicator -->
        <div id="offline-indicator" class="offline-indicator" style="display: none;">
            <span class="offline-icon">📡</span>
            <span>You're offline. Changes will sync when connection is restored.</span>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container">
            <!-- Toast notifications will be added here -->
        </div>
    </div>

    <!-- Scripts: dependencies first, app bootstrap last -->
    <script src="src/js/vendor/xlsx.full.min.js"></script>
    <script src="src/js/config.js"></script>
    <script src="src/js/core/utils.js"></script>
    <script src="src/js/core/logger.js"></script>
    <script src="src/js/core/contracts.js"></script>
    <script src="src/js/core/hoursLedger.js"></script>
    <script src="src/js/core/payrollParser.js"></script>
    <script src="src/js/core/identityMap.js"></script>
    <script src="src/js/core/workedHoursNormalizer.js"></script>
    <script src="src/js/core/availability.js"></script>
    <script src="src/js/core/assessment.js"></script>
    <script src="src/js/core/policyFlags.js"></script>
    <script src="src/js/core/effectiveRoster.js"></script>
    <script src="src/js/core/reconcile.js"></script>
    <script src="src/js/data/students.js"></script>
    <script src="src/js/data/csv.js"></script>
    <script src="src/js/core/state.js"></script>
    <script src="src/js/core/schedulingEngine.js"></script>
    <script src="src/js/core/export.js"></script>
    <script src="src/js/utils/storage.js"></script>
    <script src="src/js/utils/api.js"></script>
    <script src="src/js/core/authGate.js"></script>
    <script src="src/js/utils/notifications.js"></script>
    <script src="src/js/views/dashboard.js"></script>
    <script src="src/js/views/schedule.js"></script>
    <script src="src/js/views/swaps.js"></script>
    <script src="src/js/views/students.js"></script>
    <script src="src/js/views/analytics.js"></script>
    <script src="src/js/views/settings.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
